<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">VK favicon</title>
  <desc id="desc">Warm gradient badge with VK monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="28" x2="224" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d46c3c"/>
      <stop offset="0.55" stop-color="#c95a2d"/>
      <stop offset="1" stop-color="#8a3215"/>
    </linearGradient>
    <linearGradient id="shine" x1="64" y1="44" x2="194" y2="202" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7eb" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#fff7eb" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5a2410" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="56" fill="url(#bg)" filter="url(#shadow)"/>
  <path d="M44 52c22-20 57-30 95-24 23 4 44 14 61 30v31c-19-21-43-34-72-38-34-5-63 2-84 19V52Z" fill="url(#shine)"/>
  <rect x="34" y="34" width="188" height="188" rx="42" fill="none" stroke="#f8e7d2" stroke-opacity="0.58" stroke-width="4"/>

  <text x="128" y="152" text-anchor="middle" font-size="94" font-weight="800" letter-spacing="4" font-family="'Segoe UI', 'Manrope', Arial, sans-serif" fill="#fff8ef">VK</text>
  <path d="M78 182h100" stroke="#f6d1b2" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
</svg>
